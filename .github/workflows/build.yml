name: Build and Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Compile Java
      run: javac -encoding UTF-8 *.java
    
    - name: Create JAR
      run: |
        echo Main-Class: GameFrame > manifest.txt
        jar cfm DouDiZhu.jar manifest.txt *.class
    
    - name: Package to EXE
      run: |
        jpackage --type app-image --input . --main-jar DouDiZhu.jar --name DouDiZhu --dest output
        jpackage --type exe --input . --main-jar DouDiZhu.jar --name DouDiZhu --dest output --icon icon.ico 2>$null; if ($LASTEXITCODE -ne 0) { jpackage --type exe --input . --main-jar DouDiZhu.jar --name DouDiZhu --dest output }
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: DouDiZhu-EXE
        path: output/DouDiZhu-*.exe
